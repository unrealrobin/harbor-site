<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Harbor is a white-label launcher surface for indie studios. Ship patch notes, news, and dev comments to your players right when they hit play."
    />
    <title>Harbor — A launcher surface for indie game studios</title>
  </head>
  <body>
    <!-- Hidden static form for Netlify Forms build-time detection. The real form lives in React. -->
    <form
      name="waitlist"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="waitlist" />
      <input type="email" name="email" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
